<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Census Data Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Spinner -->
    <div id="loader" class="loader-overlay" style="display: none;">
        <div class="spinner"></div>
        <div class="progress-line"></div>
        <p style="margin-top: 1rem; font-weight: 600; color: var(--primary);">Fetching Census Records...</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="login-overlay" style="display: flex;">
        <div class="login-box">
            <h1>Census 2027</h1>
            <p>Enter your registered email to receive OTP</p>
            
            <div id="email-step">
                <input type="email" id="login-email" placeholder="email@example.com" required>
                <button id="send-otp-btn" class="btn-primary">Send OTP</button>
                <button id="show-admin-login-btn" class="btn-link" style="margin-top: 15px;">Admin Login</button>
            </div>

            <div id="otp-step" style="display: none;">
                <p>OTP sent to <b id="display-email"></b></p>
                <input type="text" id="login-otp" placeholder="Enter 6-digit OTP" maxlength="6">
                <button id="verify-otp-btn" class="btn-primary">Verify & Login</button>
                <button id="back-btn" class="btn-link">Change Email</button>
            </div>

            <div id="admin-login-step" style="display: none;">
                <p style="color: var(--primary); font-weight: 600;">Admin Access</p>
                <input type="email" id="admin-email" placeholder="Admin Email" value="jitendra.choudhery@gmail.com" required>
                <input type="password" id="admin-pin" placeholder="Enter Admin PIN" required>
                <button id="admin-login-btn" class="btn-primary">Login as Admin</button>
                <button id="back-to-user-login-btn" class="btn-link">User Login</button>
            </div>
        </div>
    </div>

    <div class="container" id="main-content" style="display: none;">
        <header>
            <div class="logo-section">
                <h1>Census 2027</h1>
                <p>Data Management Portal</p>
            </div>
            <div class="header-right">
                <div class="stats">
                    <span id="record-count">0 Records Found</span>
                </div>
                <button id="logout-btn" class="btn-link">Logout</button>
            </div>
        </header>

        <main>
            <div id="table-controls" style="display: none; margin-bottom: 1.5rem; background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                    <div style="flex: 1; min-width: 250px; display: flex; gap: 10px;">
                        <input type="text" id="search-input" placeholder="Search by Name or Mobile No..." style="flex: 1; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-family: inherit;">
                        <button id="sort-hlb-btn" class="btn-secondary" style="white-space: nowrap;">Sort by HLB ↕</button>
                        <button id="report-maps-btn" class="btn-secondary" style="white-space: nowrap; color: #ef4444; border-color: #fca5a5;">Map Report ❌</button>
                    </div>
                </div>
                <div id="column-toggles" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <!-- Checkboxes injected by JS -->
                </div>
            </div>

            <div id="data-container" class="data-grid">
                <!-- Records will be rendered here as cards -->
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Record</h2>
                <span class="close">&times;</span>
            </div>
            <form id="edit-form">
                <div id="form-fields">
                    <!-- Form fields will be injected here -->
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancel-btn">Cancel</button>
                    <button type="submit" class="btn-primary" id="save-btn">Save to Sheet2</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast">Data saved to Sheet2!</div>

    <script src="script.js"></script>
</body>
</html>
